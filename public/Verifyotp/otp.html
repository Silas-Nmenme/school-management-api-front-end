<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - School Management System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="otp.css" rel="stylesheet">
</head>
<body>
    <div class="back-to-home">
        <a href="../Home/home.html"><i class="fas fa-arrow-left me-2"></i>Back to Home</a>
    </div>

    <div class="verify-container">
        <div class="verify-header">
            <h2><i class="fas fa-shield-alt me-2"></i>Verify OTP</h2>
            <p>Enter the OTP sent to your email</p>
        </div>
        <div class="verify-body">
            <!-- Alert Messages -->
            <div id="alertMessage" class="alert" style="display: none;"></div>

            <!-- OTP Display (if available) -->
            <div id="otpDisplay" class="otp-display" style="display: none;">
                <h4>Your OTP Code:</h4>
                <div class="otp-code" id="otpCode">123456</div>
            </div>

            <form id="verifyOtpForm">
                <div class="form-group">
                    <label for="otp" class="form-label">Enter OTP</label>
                    <input type="text" class="form-control" id="otp" name="otp" required placeholder="000000" maxlength="6">
                </div>
                <button type="submit" class="btn btn-verify" id="verifyBtn">
                    <span class="loading-spinner" id="loadingSpinner"></span>
                    Verify OTP
                </button>
            </form>

            <div class="resend-otp">
                <span id="countdownText">Didn't receive OTP? <a href="#" id="resendOtp">Resend</a></span>
                <div class="countdown" id="countdown" style="display: none;">Resend in <span id="countdownTimer">60</span> seconds</div>
            </div>

            <div class="back-to-forgot">
                <a href="../Forgotpassword/forgot.html">Back to Forgot Password</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="otp.js"></script>
</body>
</html>
