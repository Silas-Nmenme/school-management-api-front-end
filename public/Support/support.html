<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Support - Bethel College</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link href="support.css" rel="stylesheet" />
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-headset me-2"></i>Support</h1>
            <p>Need help? Contact our support team</p>
        </div>
        <form id="supportForm">
            <label for="studentName">Name</label>
            <input type="text" id="studentName" name="studentName" placeholder="Your full name" required />

            <label for="studentEmail">Email</label>
            <input type="email" id="studentEmail" name="studentEmail" placeholder="Your email address" required />

            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="Subject of your request" required />

            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="" disabled selected>Select a category</option>
                <option value="General">General</option>
                <option value="Technical">Technical</option>
                <option value="Billing">Billing</option>
                <option value="Academic">Academic</option>
            </select>

            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Describe your issue or question" required></textarea>

            <button type="submit">Submit Request</button>
        </form>
        <div id="alertPlaceholder"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="support.js"></script>
</body>
</html>
