<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses - Bethel College</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="courses.css" rel="stylesheet">
</head>
<body>
    <div class="courses-container">
        <div class="courses-header">
            <h1><i class="fas fa-book me-2"></i>Manage Courses - Bethel College</h1>
            <p>Add, edit, or delete courses in the system</p>
        </div>
        <div class="courses-body">
            <!-- Alert Messages -->
            <div id="alertMessage" class="alert" style="display: none;"></div>
            
            <!-- Action Buttons -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <button class="btn btn-custom" onclick="loadCourses()">
                    <i class="fas fa-sync-alt me-2"></i>Refresh Courses
                </button>
                <button class="btn btn-custom" onclick="showAddCourseModal()">
                    <i class="fas fa-plus me-2"></i>Add New Course
                </button>
            </div>

            <!-- Courses Table -->
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Course ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Instructor</th>
                            <th>Max Students</th>
                            <th>Duration</th>
                            <th>Schedule</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="coursesTableBody">
                        <tr>
                            <td colspan="8" class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p>Loading courses...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Back to Dashboard -->
            <div class="text-center mt-4">
                <a href="../admindash.html" class="btn btn-secondary-custom">
                    <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <!-- Add/Edit Course Modal -->
    <div class="modal fade" id="courseModal" tabindex="-1" aria-labelledby="courseModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="courseModalLabel">Add Course</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="courseForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="courseId" class="form-label">Course ID <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="courseId" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="courseName" class="form-label">Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="courseName" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="courseDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="courseDescription" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="courseInstructor" class="form-label">Instructor ID <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="courseInstructor" required placeholder="MongoDB ObjectId">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="courseInstructorModel" class="form-label">Instructor Type <span class="text-danger">*</span></label>
                                <select class="form-control" id="courseInstructorModel" required>
                                    <option value="">Select Type</option>
                                    <option value="Staff">Staff</option>
                                    <option value="Student">Student</option>
                                    <option value="Admin">Admin</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="courseMaxStudents" class="form-label">Max Students <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="courseMaxStudents" required min="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="courseDuration" class="form-label">Duration <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="courseDuration" required placeholder="e.g., 3 months">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="courseStartTime" class="form-label">Start Time <span class="text-danger">*</span></label>
                                <input type="time" class="form-control" id="courseStartTime" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="courseEndTime" class="form-label">End Time <span class="text-danger">*</span></label>
                                <input type="time" class="form-control" id="courseEndTime" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="courseDays" class="form-label">Days <span class="text-danger">*</span></label>
                                <select class="form-control" id="courseDays" multiple required>
                                    <option value="MONDAY">Monday</option>
                                    <option value="TUESDAY">Tuesday</option>
                                    <option value="WEDNESDAY">Wednesday</option>
                                    <option value="THURSDAY">Thursday</option>
                                    <option value="FRIDAY">Friday</option>
                                    <option value="SATURDAY">Saturday</option>
                                    <option value="SUNDAY">Sunday</option>
                                </select>
                                <small class="text-muted">Hold Ctrl (Windows) or Command (Mac) to select multiple days.</small>
                            </div>
                        </div>
                        <input type="hidden" id="courseIdHidden">
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-custom" onclick="saveCourse()">Save Course</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="courses.js"></script>
</body>
</html>
