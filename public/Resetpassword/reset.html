<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - School Management System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="reset.css" rel="stylesheet">
</head>
<body>
    <div class="back-to-home">
        <a href="../Home/home.html"><i class="fas fa-arrow-left me-2"></i>Back to Home</a>
    </div>

    <div class="reset-container">
        <div class="reset-header">
            <h2><i class="fas fa-lock me-2"></i>Reset Password</h2>
            <p>Enter your new password</p>
        </div>
        <div class="reset-body">
            <!-- Alert Messages -->
            <div id="alertMessage" class="alert" style="display: none;"></div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="newPassword" class="form-label">New Password</label>
                    <div class="password-toggle">
                        <input type="password" class="form-control" id="newPassword" name="newPassword" required placeholder="Enter new password">
                        <button type="button" class="btn" id="toggleNewPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm New Password</label>
                    <div class="password-toggle">
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required placeholder="Confirm new password">
                        <button type="button" class="btn" id="toggleConfirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback" id="passwordMatch" style="display: none;">Passwords do not match</div>
                </div>
                <button type="submit" class="btn btn-reset" id="resetBtn">
                    <span class="loading-spinner" id="loadingSpinner"></span>
                    Reset Password
                </button>
            </form>

            <div class="back-to-login">
                <a href="../Login/login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="reset.js"></script>
</body>
</html>
