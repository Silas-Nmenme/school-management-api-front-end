<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - School Management System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Custom CSS -->
     <link rel="stylesheet" href="./profile.css">

</head>
<body>
     <div class="profile-container">
        <div class="profile-header">
            <h1><i class="fas fa-user me-2"></i>Profile</h1>
            <p>View and update your personal information</p>
        </div>
        <div class="profile-body">
            <!-- Profile Display Card -->
            <div class="card" id="profileDisplayCard">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-id-card me-2"></i>Your Profile Information</h5>
                </div>
                <div class="card-body">
                    <div class="profile-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div id="profileInfo">
                        <div class="text-center mb-4">
                            <h4 id="studentName">Loading...</h4>
                            <p class="text-muted" id="studentId">Loading...</p>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Email:</span>
                            <span class="info-value" id="studentEmail">Loading...</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Age:</span>
                            <span class="info-value" id="studentAge">Loading...</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Phone:</span>
                            <span class="info-value" id="studentPhone">Loading...</span>
                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <button class="btn btn-custom" id="editProfileBtn">
                            <i class="fas fa-edit me-2"></i>Edit Profile
                        </button>
                        <a href="student_dashboard.html" class="btn btn-secondary-custom">
                            <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                        </a>
                    </div>
                </div>
            </div>

            <!-- Edit Profile Form -->
            <div class="card" id="editProfileCard" style="display: none;">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-user-edit me-2"></i>Update Profile</h5>
                </div>
                <div class="card-body">
                    <div id="editAlert" class="alert" style="display: none;"></div>
                    <form id="editProfileForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editFirstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="editFirstName" name="Firstname" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editLastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="editLastName" name="Lastname" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editAge" class="form-label">Age</label>
                                    <input type="number" class="form-control" id="editAge" name="age" min="1" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editPhone" class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="editPhone" name="phone" required>
                                </div>
                            </div>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-custom" id="updateProfileBtn">
                                <span class="loading-spinner" id="updateSpinner"></span>
                                Update Profile
                            </button>
                            <button type="button" class="btn btn-secondary-custom" id="cancelEditBtn">
                                <i class="fas fa-times me-2"></i>Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
     <script src="./profile.js"></script>
</body>
</html>
